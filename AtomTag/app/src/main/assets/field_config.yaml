# Field-layout config. All distances are millimeters; the loader converts to meters.
# Coordinate notes:
#   - "tag-local" is the origin tag's frame (X right, Y up, Z out of the tag face).
#   - "field" is tag-local translated by transforms_mm.tag0_to_field. Z=0 = floor.
#   - Lines are expressed in field-frame coords; the renderer adds the offset.

# Overall playing surface dimensions, used by future field renderings (sidelines, etc.).
size_mm:
  x: 750
  y: 450

# Pure-translation rigid transforms from the origin tag (id 0) to other reference points.
# tag0_to_field places the field origin somewhere away from the tag (typically center-field);
# tag0_to_goalie_box places the goalie-box center wherever the goalie's painted box sits.
transforms_mm:
  tag0_to_field:
    x: 451.872
    y: -118.1
    z: -29.7    # tag is 29.7mm above the floor; field z=0 ends up at floor level.
  tag0_to_goalie_box:
    x: 120
    y: -118.1
    z: -29.7
  tag0_to_scoreboard:
    x: 0
    y: -270
    z: 0       # flat on the tag's plane; sits at tag-face height above the floor.

# Goalie box footprint: a rounded rectangle on the floor, centered at tag0_to_goalie_box.
goalie_box:
  width_mm: 130         # extent along the field X axis
  height_mm: 200        # extent along the field Y axis
  corner_radius_mm: 20  # corner fillet
  # Optional fill color for the interior (clipped to field bounds and to robots).
  # Allowed: orange | blue | none (or omit the key).
  fill_color: orange

# Flat scoreboard rectangle drawn on the tag's plane. Layout (clock + per-team
# scores) is laid out in scoreboard-local coordinates inside the renderer.
scoreboard:
  width_mm: 120         # along scoreboard-local +X (before rotation)
  height_mm: 80         # along scoreboard-local +Y (before rotation)
  # CCW rotation about the scoreboard's vertical (z) axis, in degrees, applied
  # before placing it in tag-local coords. 90 = bottom edge parallel to the
  # tag-Y axis. Use 0 / ±90 / 180 to taste.
  rotation_deg: 90

# Physical ball geometry. Used by the ball detector's geometric size gate.
ball:
  radius_mm: 28

# Robot body geometry. Treated as a cube centered on the tag's XY origin, with the
# tag mounted on the top face (tag-local +Z up, body extending in -Z toward floor).
# Used by the overlay renderer to mask out field lines that fall under each robot's
# projected silhouette so they don't paint across the robot.
robot:
  body_mm: 60

# Field-line markings. Each entry is a straight segment expressed in FIELD-frame coords.
# Add more as needed (sidelines, etc.). Curves / arcs would need a schema extension
# (e.g. a 'type: arc' variant) — kept flat for now. The halfway line and center
# circle are NOT in here — they have their own dedicated knobs under `markings:`.
lines:
  - name: goal_line
    from_mm: [-374, -60, 0]
    to_mm:   [-374,  60, 0]

# Green-turf background — filled rectangle covering the field interior with an
# optional mowed-stripe overlay (alternating-brightness bands). Colors are hex
# "#RRGGBB"; per-section `alpha` is the 0–255 final-paint alpha.
turf:
  enabled: true
  color: "#2E7D32"
  alpha: 180
  corner_radius_mm: 30         # rounded turf corners; 0 = sharp rectangle
  mowed_stripes_n: 12          # 0 disables stripes
  mowed_stripes_delta: 14      # ±RGB shift between adjacent stripes
  mowed_stripes_axis: vertical # vertical | horizontal | none

# Cosmetic interior soccer-field markings: halfway line, center circle, center
# dot. The same color + alpha + line_width also drive the existing field lines
# (above) and the goalie-box outline — one knob, every white marking.
markings:
  enabled: true
  color: "#FFFFFF"
  alpha: 220
  line_width_px: 4
  halfway_line: true
  center_circle_radius_mm: 80   # 0 disables
  center_dot_radius_mm: 0       # 0 disables

# Logo bitmap painted as a perspective-correct quad at field center (field
# origin). The asset must live under app/src/main/assets/.
# `tint` optionally replaces every non-transparent pixel with a solid color
# while preserving the bitmap's alpha mask (PorterDuff SRC_IN). Set to a hex
# color to retint (e.g. "#FFFFFF" to render a black silhouette PNG in white);
# omit / "none" to render the bitmap unchanged.
logo:
  enabled: true
  asset: atom_electron.png
  width_mm: 120
  height_mm: 120
  alpha: 220
  tint: "#FFFFFF"
