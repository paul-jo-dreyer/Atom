# Solo PPO training config — defaults match the legacy CLI defaults so
# that `--config default_solo.yaml` is behaviourally identical to a
# default `python -m AtomGym.training.train` invocation.
#
# Schema: see `AtomGym/training/config.py`.

env:
  max_episode_steps: 100
  # GAME RULE: opposing goalie-box geometry + per-visit time budget.
  # `goalie_box_terminal_time = 0` disables the rule (legacy behaviour
  # preserved). Set to a positive value (e.g. 3.0) to enforce a
  # per-visit budget on the opposing goalie box. When enabled, ALSO
  # uncomment the `goalie_box:` reward below — the reward inherits
  # these three values automatically (single source of truth).
  goalie_box_depth: 0.13
  goalie_box_y_half: 0.11             # half of style.markings.goalie_box_height_m=0.22
  # Corner radius for the field-facing corners of the goalie box.
  # MUST match the visual style's `markings.goalie_box_corner_radius_m`
  # so the rendered marking and the rule agree. 0 ⟹ legacy sharp box.
  goalie_box_corner_radius: 0.07
  goalie_box_terminal_time: 3.0
  manipulator: default_pusher

rewards:
  ball_progress:
    weight: 5.0
  distance_to_ball:
    weight: -0.25
  # goal_scored:
  #   weight: 100.0
  stall_penalty:
    weight: -0.005
  # obstacle_contact:
  #   weight: -0.1
  ball_alignment:
    weight: 0.5
    # inner_radius / outer_radius / back_weight: class defaults
    # (0.0 / 0.18 / 0.3 — see ball_alignment.py).

  static_field:
    weight: -0.1
    include_goalie_box: false  # walls-only; box is handled below

  # Active when env.goalie_box_terminal_time > 0 above. Inherits the
  # game-rule values (terminal_time, goalie_box_depth, goalie_box_y_half)
  # from `env:` — the loader rejects setting them here. Fields below
  # are pure training-shaping knobs.
  #
  # Calibration: with these values the worst-case violation cost
  # (loiter deep through the full warning window + get terminated)
  # ≈ weight * n_steps / (power+1)   +   weight * termination_penalty
  #   = -0.5 * 54 / 4                +   -0.5 * 20
  #   ≈ -6.8                         +   -10
  #   = -16.8
  # vs goal_scored=+10 ⟹ violation costs ~1.7× a goal. See the
  # "Calibration" section in goalie_box_penalty.py docstring for the
  # full reasoning + how to tune.

  # goalie_box:
  #   weight: -0.5
  #   trigger_time: 1.2            # seconds after entry before the ramp activates
  #   power: 1.0                   # polynomial steepness of the ramp
  #   termination_penalty: 10.0    # sparse cost on violation, in `weight` units
  #   depth_saturation: 0.06       # depth (m) at which the raw depth factor hits 1
  #   # Linear blend toward "uniform inside box": effective_depth_factor
  #   # = (1 − depth_floor) × raw + depth_floor. 0 = pure depth-graduated
  #   # potential field (boundary contributes 0). 1 = uniform per-step
  #   # penalty across the box interior. 0.5 ⟹ boundary at 50% of
  #   # centroid magnitude — meaningful warning even at the edge while
  #   # keeping a mild outward gradient.
  #   depth_floor: 0.5
